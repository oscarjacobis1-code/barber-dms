<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Work — Suárez Barbería &amp; Salón</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,900;1,500;1,600&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <div class="wrap">
    <a href="index.html" class="nav-mark">SU<span>Á</span>REZ</a>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="index.html#services">Services</a>
      <a href="work.html" class="active">The Work</a>
      <a href="index.html#visit">Visit</a>
      <a href="#" data-book-link class="nav-cta">Book a Chair</a>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span></button>
  </div>
</nav>

<svg class="tile-strip" viewBox="0 0 240 34" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <pattern id="tile3" width="34" height="34" patternUnits="userSpaceOnUse">
      <rect width="34" height="34" fill="#EFE2CE"/>
      <path d="M17 2C24 2 32 10 32 17 32 24 24 32 17 32 10 32 2 24 2 17 2 10 10 2 17 2Z" fill="none" stroke="#A6813F" stroke-width="1.3"/>
      <path d="M17 8 26 17 17 26 8 17Z" fill="#B24F2A"/>
      <circle cx="17" cy="17" r="3" fill="#241A13"/>
    </pattern>
  </defs>
  <rect width="240" height="34" fill="url(#tile3)"/>
</svg>

<section class="gallery-head wrap reveal in">
  <span class="eyebrow">Selected Work</span>
  <h1>Every fade tells<br>the same story: precision.</h1>
  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="cut">Cuts &amp; Fades</button>
    <button class="filter-btn" data-filter="beard">Beard Work</button>
    <button class="filter-btn" data-filter="color">Color &amp; Gray Blend</button>
  </div>
</section>

<section class="wrap">
  <div class="gallery-grid" id="js-gallery">
    <div class="gallery-item reveal in" data-cat="cut">
      <div class="cap">Skin Fade, Textured Top<small>Cuts &amp; Fades</small></div>
    </div>
  </div>
</section>

<section class="section dark" style="padding:80px 0;">
  <div class="wrap" style="text-align:center;">
    <span class="eyebrow">Ready When You Are</span>
    <h2 style="margin-bottom:26px;">Every one of these started with a conversation.</h2>
    <a href="#" data-book-link class="btn btn-primary">Book a Chair</a>
  </div>
</section>

<div class="dark">
  <div class="footer wrap">
    <span>© 2026 Suárez Barbería &amp; Salón</span>
    <span>By appointment only</span>
  </div>
</div>

<script src="render.js"></script>
<script>
  const navToggle = document.getElementById('navToggle');
  const navLinks = document.getElementById('navLinks');
  navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));

  renderWork();
</script>
</body>
</html>
